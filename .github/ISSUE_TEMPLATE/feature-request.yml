name: Feature Request
description: Suggest an idea or improvement
labels: ["type:enhancement", "status:triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature!

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve? What's the motivation?
      placeholder: "I'm frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like it to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've thought about?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI / UX
        - Detection (T1/T2/T3)
        - Ecosystem support
        - CI integration
        - Output / Reporting
        - Performance
        - Documentation
        - Other
    validations:
      required: true
