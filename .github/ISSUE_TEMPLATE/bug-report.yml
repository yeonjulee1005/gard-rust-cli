name: Bug Report
description: Something isn't working as expected
labels: ["type:bug", "status:triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: gard version
      description: Run `gard --version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: dropdown
    id: ecosystem
    attributes:
      label: Ecosystem
      options:
        - npm
        - PyPI
        - crates.io
        - Multiple / Unknown
    validations:
      required: false

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run `gard init`
        2. Run `gard scan --packages`
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Include any error output (run with `-vv` for more detail)
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Relevant config, lockfile snippets, environment variables, etc.
