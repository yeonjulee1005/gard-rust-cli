name: Security Audit

on:
  schedule:
    - cron: "0 9 * * 1"   # every Monday at 09:00 UTC
  push:
    paths:
      - Cargo.toml
      - Cargo.lock

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
